<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF OCR Side-by-Side</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header>
        <h1>PDF OCR Viewer</h1>
        <p>Upload a PDF to preview pages and run OCR with Tesseract.js.</p>
      </header>

      <section class="controls">
        <label for="pdf-upload" class="upload-label">Choose PDF</label>
        <input id="pdf-upload" type="file" accept="application/pdf" />
        <button id="run-ocr" disabled>Run OCR</button>
        <button id="apply-corrections" disabled>Apply Edits to Remaining Pages</button>
        <p id="status" role="status" aria-live="polite">No PDF selected.</p>
      </section>

      <section class="workspace" aria-label="PDF and OCR results">
        <div class="panel">
          <h2>PDF Preview</h2>
          <div id="pdf-container" class="scroll-area"></div>
        </div>
        <div class="panel">
          <h2>Tesseract Output</h2>
          <div id="ocr-output" class="scroll-area output"></div>
        </div>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
